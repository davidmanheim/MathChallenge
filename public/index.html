<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathChallenge Alpha</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card hero">
        <h1>MathChallenge Clubhouse</h1>
        <p>Play puzzle sets, collect streaks, and level up your math brain.</p>
      </section>

      <section class="card">
        <h2>1) Login</h2>
        <div class="row">
          <input id="name" placeholder="Kid name" />
          <select id="gradeBand">
            <option value="1-2">Grades 1-2</option>
            <option value="2-3">Grades 2-3</option>
            <option value="3-4">Grades 3-4</option>
            <option value="4-6">Grades 4-6</option>
            <option value="6-8">Grades 6-8</option>
            <option value="8-10">Grades 8-10</option>
          </select>
          <button id="loginBtn">Login</button>
        </div>
        <p id="profileStatus" class="muted"></p>
      </section>

      <section class="card">
        <h2>2) Puzzle Run</h2>
        <div class="row" id="puzzleControlsRow">
          <select id="gameType"></select>
          <label for="difficulty">Difficulty</label>
          <div class="difficulty-stepper">
            <button id="difficultyDown" type="button" aria-label="Decrease difficulty">-</button>
            <input id="difficulty" type="number" min="1" max="6" value="1" />
            <button id="difficultyUp" type="button" aria-label="Increase difficulty">+</button>
          </div>
          <span id="difficultyLabel" class="pill">Easy</span>
          <label id="setSizeLabel" for="setSize">Set Size</label>
          <input id="setSize" type="number" min="1" max="12" value="5" />
          <button id="newPuzzleBtn">Start Set</button>
        </div>
        <p id="setProgress" class="muted"></p>
        <div id="puzzleBox" class="puzzle"></div>
        <div id="choiceButtons" class="choice-grid"></div>
        <div id="numberLine" class="number-line"></div>

        <div id="factorNinjaZone" class="fn-zone" style="display:none">
          <div class="fn-header">
            <span class="fn-streak" id="fnStreak"></span>
            <span class="fn-sub-label" id="fnSubLabel"></span>
            <button id="fnHintBtn" class="fn-hint-btn" type="button">Hint</button>
          </div>
          <div class="fn-arena" id="fnArena">
            <!-- Prime Factors mode -->
            <div class="fn-orb-area" id="fnOrbArea">
              <div class="fn-orb" id="fnOrb"></div>
            </div>
            <div class="fn-tray" id="fnTray"></div>
            <div class="fn-primes" id="fnPrimes"></div>
            <!-- GCF / LCM mode -->
            <div class="fn-cards" id="fnCards"></div>
            <div class="fn-keypad" id="fnKeypad"></div>
            <div class="fn-hint-area" id="fnHintArea"></div>
          </div>
          <div class="fn-banner" id="fnBanner"></div>
          <div class="fn-particles" id="fnParticles"></div>
        </div>

        <!-- KenKen Zone -->
        <div id="kenkenZone" class="kk-zone" style="display:none">
          <div class="kk-grid" id="kkGrid"></div>
          <div class="kk-controls">
            <div class="kk-numpad" id="kkNumpad"></div>
            <button class="kk-check-btn" id="kkCheckBtn">Check Solution</button>
          </div>
          <div class="kk-banner" id="kkBanner"></div>
        </div>

        <!-- Balance Scale Zone -->
        <div id="balanceZone" class="bs-zone" style="display:none">
          <div class="bs-scale" id="bsScale">
            <div class="bs-pan bs-left" id="bsLeft"></div>
            <div class="bs-fulcrum"></div>
            <div class="bs-pan bs-right" id="bsRight"></div>
          </div>
          <div class="bs-equation" id="bsEquation"></div>
          <div class="bs-input-area">
            <span class="bs-label">x =</span>
            <div class="bs-keypad" id="bsKeypad"></div>
          </div>
          <div class="bs-banner" id="bsBanner"></div>
        </div>

        <!-- Shikaku Zone -->
        <div id="shikakuZone" class="sk-zone" style="display:none">
          <div class="sk-grid-wrap" id="skGridWrap">
            <canvas id="skCanvas"></canvas>
          </div>
          <div class="sk-controls">
            <button class="sk-undo-btn" id="skUndoBtn">Undo</button>
            <button class="sk-clear-btn" id="skClearBtn">Clear All</button>
            <button class="sk-check-btn" id="skCheckBtn">Check Solution</button>
          </div>
          <div class="sk-banner" id="skBanner"></div>
        </div>

        <div class="row" id="answerRow">
          <input id="answer" placeholder="Your answer" />
          <button id="submitBtn">Submit</button>
          <button id="hintBtn">Hint</button>
        </div>
        <div id="mismoZone" class="mismo-zone" style="display:none">
          <div class="mismo-head">
            <span id="mismoProgress"></span>
          </div>
          <div id="mismoBoard" class="mismo-board"></div>
        </div>
        <div id="xOutsZone" class="xouts-zone" style="display:none">
          <div id="xOutsStatus" class="xouts-status"></div>
          <div id="xOutsBoard" class="xouts-board"></div>
        </div>
        <div id="numberPathsZone" class="np-zone" style="display:none">
          <div id="numberPathsStatus" class="np-status"></div>
          <div id="numberPathsBoard" class="np-board"></div>
        </div>
        <p id="result"></p>
      </section>

      <section class="card">
        <h2>3) Progress</h2>
        <pre id="progress"></pre>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
